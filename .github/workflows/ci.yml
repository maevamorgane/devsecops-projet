name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : Lint YAML
  # ─────────────────────────────────────────
  lint-yaml:
    name: Lint YAML files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint deployment.yaml
        run: yamllint deployment.yaml

  # ─────────────────────────────────────────
  # JOB 2 : Build Docker image
  # ─────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t flask-api:latest .

  # ─────────────────────────────────────────
  # JOB 3 : Scan Trivy (dépendances)
  # ─────────────────────────────────────────
  trivy-fs:
    name: Trivy - Scan filesystem (dépendances)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy on filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'        # 0 = ne fait pas échouer le pipeline
          severity: 'CRITICAL,HIGH'

  # ─────────────────────────────────────────
  # JOB 4 : Scan Trivy (image Docker)
  # ─────────────────────────────────────────
  trivy-image:
    name: Trivy - Scan Docker image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t flask-api:latest .

      - name: Run Trivy on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'flask-api:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # ─────────────────────────────────────────
  # JOB 5 : Conftest - Politique Kubernetes
  # ─────────────────────────────────────────
  conftest:
    name: Conftest - Policy check (no root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.46.0/conftest_0.46.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.46.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Run Conftest policy check
        run: conftest test deployment.yaml --policy policy/
        continue-on-error: true   # ne bloque pas, juste pour voir le résultat
